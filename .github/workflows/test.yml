name: connect

on: [push, workflow_dispatch]

jobs:
  test-iranian-hosts:
    runs-on: ubuntu-latest
    
    steps:
    - name: dns resolve and port check
      run: |
        dig short+ pasted.ir
        echo "port sex"
        nc -zvw5 pasted.ir 443
    - name: Test HTTP/HTTPS Connectivity
      run: |
        
        echo "Testing arvancloud.ir:"
        curl -v -L -m 10 https://pasted.ir 2>&1 | head -20
    
    - name: Test HTTPS ports again
      run: |
        echo "testing 443 for runflare.com"
        timeout 5 bash -c "echo -e 'GET / HTTP/1.0\r\n\r\n' > /dev/tcp/pasted.ir/443 && cat < /dev/tcp/pasted.ir/443"
